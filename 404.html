<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#1E90FF">
  <title>Página no encontrada · Zervitecnics</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a1f3d, #132848 50%, #1a3a6b);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .box { max-width: 520px; }
    h1 { font-size: 96px; margin: 0 0 8px; font-weight: 800; line-height: 1; }
    p { font-size: 18px; color: rgba(255,255,255,.8); margin: 0 0 28px; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 10px;
      background: #1E90FF;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: background .2s;
    }
    .btn:hover { background: #1872d3; }
    .sub { font-size: 14px; color: rgba(255,255,255,.55); margin-top: 16px; }
    .sub a { color: rgba(255,255,255,.85); }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>La página que buscas no existe o se ha movido.</p>
    <a class="btn" href="/">Volver al inicio</a>
    <div class="sub">¿Buscas aire acondicionado? <a href="/aires-acondicionados/">Ir al servicio</a></div>
  </div>
</body>
</html>
