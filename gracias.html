<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#1E90FF">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://*.google-analytics.com; connect-src 'self' https://api.emailjs.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com; frame-src https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="noindex, follow">

  <title>¡Gracias! Presupuesto solicitado | Zervitecnics Barcelona</title>
  <meta name="description" content="Hemos recibido tu solicitud de presupuesto. Te contactamos en menos de 2 horas.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/shared.css">

  <style>
    .gracias-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: linear-gradient(135deg, var(--navy) 0%, #132848 40%, #1a3a6b 100%);
    }
    .gracias-card {
      background: var(--white, #fff);
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,.3);
    }
    .gracias-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .gracias-card h1 {
      font-family: var(--font-title, sans-serif);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--navy, #0B1E3D);
      margin-bottom: 12px;
    }
    .gracias-card p {
      font-size: .95rem;
      color: var(--gray-600, #4A5A6B);
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .gracias-pasos {
      text-align: left;
      background: var(--gray-50, #F7F9FB);
      border-radius: 12px;
      padding: 18px 20px;
      margin: 20px 0;
      font-size: .88rem;
      color: var(--gray-600, #4A5A6B);
      line-height: 2;
    }
    .gracias-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
    .gracias-logo { margin-top: 28px; }
    .gracias-logo img { height: 44px; width: auto; }
  </style>
</head>
<body>

<div class="gracias-wrap">
  <div class="gracias-card">
    <div class="gracias-icon">✅</div>
    <h1>¡Presupuesto solicitado!</h1>
    <p>Hemos recibido tu solicitud correctamente.</p>

    <div class="gracias-pasos">
      <strong>¿Qué pasa ahora?</strong><br>
      1️⃣ Revisamos tu solicitud<br>
      2️⃣ Te llamamos en menos de 2 horas (horario laboral)<br>
      3️⃣ Recibes tu presupuesto sin compromiso
    </div>

    <p style="font-size:.85rem">¿Es urgente? Llámanos directamente:</p>

    <div class="gracias-actions">
      <a href="tel:+34693123456" class="btn btn-primary" data-location="gracias">📞 693 123 456</a>
      <a href="index.html" class="btn btn-outline">← Volver al inicio</a>
    </div>

    <div class="gracias-logo">
      <img src="img/logo_zervitecnics.png" alt="Zervitecnics Barcelona">
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
</body>
</html>
